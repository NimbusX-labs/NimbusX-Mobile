<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="55%" stop-color="#070c18"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>

    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8">
        <animate attributeName="stop-color"
          values="#1d4ed8;#22d3ee;#1d4ed8"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <animate attributeName="x1" values="0%;30%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;70%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bgGrad)"/>

  <!-- subtle animated grid dots -->
  <g opacity="0.25">
    <g>
      <circle cx="120" cy="60" r="1.6" fill="#3b82f6"/>
      <circle cx="220" cy="140" r="1.2" fill="#22d3ee"/>
      <circle cx="1100" cy="80" r="1.6" fill="#3b82f6"/>
      <circle cx="1180" cy="220" r="1.3" fill="#22d3ee"/>
      <circle cx="80" cy="280" r="1.4" fill="#3b82f6"/>
      <circle cx="1000" cy="300" r="1.2" fill="#22d3ee"/>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 -8; 0 0" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- glow behind logo -->
  <circle cx="150" cy="180" r="120" fill="url(#glow)">
    <animate attributeName="r" values="110;135;110" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- pulse rings -->
  <circle cx="150" cy="180" r="60" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="50;95" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="180" r="60" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="50;95" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- X logo mark -->
  <g transform="translate(150,180)">
    <g>
      <path d="M -48 -48 L 48 48" stroke="url(#xGrad)" stroke-width="22" stroke-linecap="round"/>
      <path d="M 48 -48 L -48 48" stroke="url(#xGrad)" stroke-width="22" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="rotate"
        values="0;4;0;-4;0" dur="7s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="300" y="165" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#f8fafc">
    Nimbus<tspan fill="#38bdf8">X</tspan>
  </text>

  <!-- typing tagline -->
  <text x="302" y="205" font-family="Consolas, Menlo, monospace" font-size="20" fill="#7dd3fc" letter-spacing="1">
    <tspan id="type-text">Private. Real-time. End-to-end encrypted.</tspan>
    <animate attributeName="opacity" values="1;1;0.2;1" dur="3.2s" repeatCount="indefinite"/>
  </text>
  <rect x="302" y="214" width="10" height="20" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="x" values="302;700;302" dur="6s" repeatCount="indefinite"/>
  </rect>

  <text x="302" y="245" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#64748b" letter-spacing="3">
    COMMUNICATION PLATFORM · REACT NATIVE · SUPABASE
  </text>

  <!-- floating particles across banner -->
  <g fill="#38bdf8">
    <circle cx="700" cy="80" r="2" opacity="0.7">
      <animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="260" r="2.4" opacity="0.6">
      <animate attributeName="cy" values="260;235;260" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="150" r="1.8" opacity="0.8">
      <animate attributeName="cy" values="150;125;150" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="250" r="2" opacity="0.5">
      <animate attributeName="cy" values="250;225;250" dur="5.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="290" r="1.6" opacity="0.7">
      <animate attributeName="cy" values="290;270;290" dur="4.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- chat bubble motif, right side -->
  <g transform="translate(1080,140)" opacity="0.9">
    <rect x="0" y="0" width="120" height="46" rx="14" fill="#0f172a" stroke="#1e40af" stroke-width="1.5"/>
    <circle cx="20" cy="23" r="4" fill="#38bdf8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="23" r="4" fill="#38bdf8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="23" r="4" fill="#38bdf8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <animateTransform attributeName="transform" type="translate"
      values="1080 140; 1080 128; 1080 140" dur="4s" repeatCount="indefinite"/>
  </g>
</svg>
